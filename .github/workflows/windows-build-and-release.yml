name: Windows Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build Release
        run: cmake --build build --config Release --target kasane

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kasane-windows-Release
          path: build/kasane_artefacts/Release/Kasane.exe

      - name: Prepare release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageRoot = Join-Path $env:RUNNER_TEMP "Kasane-windows-x64"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "Kasane-windows-x64.zip"

          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force $packageRoot | Out-Null
          Copy-Item "build/kasane_artefacts/Release/Kasane.exe" $packageRoot
          Copy-Item "LICENSE" $packageRoot
          Copy-Item "THIRD_PARTY_NOTICES.md" $packageRoot
          Copy-Item "README.md" $packageRoot

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$packageRoot\\*" -DestinationPath $zipPath -Force

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "Kasane-windows-x64.zip"
          $notes = @"
          Windows build of Kasane.

          Note:
          - The target Windows machine needs Microsoft Edge WebView2 Runtime installed.
          "@

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset --title $tag --notes $notes --generate-notes --repo $env:GITHUB_REPOSITORY
          }
