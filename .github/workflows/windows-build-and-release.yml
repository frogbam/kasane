name: Windows Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      WEBVIEW2_VERSION: 1.0.3800.47

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install WebView2 SDK package
        shell: pwsh
        run: |
          $packageSourceName = "nugetRepository"

          if (-not (Get-PackageSource -Name $packageSourceName -ProviderName NuGet -ErrorAction SilentlyContinue)) {
            Register-PackageSource -ProviderName NuGet -Name $packageSourceName -Location https://www.nuget.org/api/v2 -Trusted
          }

          Install-Package Microsoft.Web.WebView2 `
            -ProviderName NuGet `
            -RequiredVersion $env:WEBVIEW2_VERSION `
            -Scope CurrentUser `
            -Source $packageSourceName `
            -Force

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build Release
        run: cmake --build build --config Release --target kasane

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Kasane-windows-Release
          path: build/kasane_artefacts/Release/Kasane.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "build/kasane_artefacts/Release/Kasane.exe"
          $notes = @"
          Windows build of Kasane.

          Note:
          - The target Windows machine needs Microsoft Edge WebView2 Runtime installed.
          "@

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset --title $tag --notes $notes --repo $env:GITHUB_REPOSITORY
          }
